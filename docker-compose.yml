services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: has
      POSTGRES_PASSWORD: has
      POSTGRES_DB: has
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U has -d has"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://has:has@db:5432/has
      CORS_ORIGINS: http://localhost:3000
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-ansonangzhenloong@gmail.com}
      # 仅开发:request-link 响应直接带链接,便于测试;生产必须删除
      DEBUG_EXPOSE_MAGIC_LINK: ${DEBUG_EXPOSE_MAGIC_LINK:-true}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      # 留空 = 走 Next 同源代理(/api → backend),session cookie 才能工作
      NEXT_PUBLIC_API_URL: ""
      BACKEND_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
