services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: has
      POSTGRES_PASSWORD: has
      POSTGRES_DB: has
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U has -d has"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: has
      MINIO_ROOT_PASSWORD: hasminio123
    ports:
      - "9000:9000"
      - "9001:9001"   # web console
    volumes:
      - miniodata:/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://has:has@db:5432/has
      CORS_ORIGINS: http://localhost:3000
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-ansonangzhenloong@gmail.com}
      # 调试用:request-otp 响应直接带验证码(跳过读邮箱)。默认关闭 = 真实邮件流程;
      # 跑自动化测试时可在 .env 设 DEBUG_EXPOSE_OTP=true 临时打开
      DEBUG_EXPOSE_OTP: ${DEBUG_EXPOSE_OTP:-false}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: has
      MINIO_SECRET_KEY: hasminio123
      MINIO_BUCKET: resumes
      MINIO_SECURE: "false"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    environment:
      # 留空 = 走 Next 同源代理(/api → backend),session cookie 才能工作
      NEXT_PUBLIC_API_URL: ""
      BACKEND_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
  miniodata:
